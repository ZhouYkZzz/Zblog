services:
  zblog:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      ENABLE_MAC_REMINDERS: "false"
    volumes:
      - ./data:/app/data
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - zblog
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/ip.conf:/etc/nginx/conf.d/default.conf:ro
